version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cognicart-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cognicart
      POSTGRES_PASSWORD: cognicart
      POSTGRES_DB: cognicart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognicart"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cognicart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cognicart-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://cognicart:cognicart@postgres:5432/cognicart
      - DATABASE_URL_SYNC=postgresql://cognicart:cognicart@postgres:5432/cognicart
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-cognicart-super-secret-key-change-in-prod}
      - CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
      - FRONTEND_URL=http://localhost:3000
      - DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ml_models:/app/ml_models

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cognicart-celery
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://cognicart:cognicart@postgres:5432/cognicart
      - DATABASE_URL_SYNC=postgresql://cognicart:cognicart@postgres:5432/cognicart
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-cognicart-super-secret-key-change-in-prod}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ml_models:/app/ml_models

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cognicart-celery-beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL_SYNC=postgresql://cognicart:cognicart@postgres:5432/cognicart
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cognicart-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: cognicart-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  ml_models:
